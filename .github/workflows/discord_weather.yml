name: 诸暨天气 Discord 推送

on:
  schedule:
    - cron: '0 22 * * *'   # 北京时间 06:00
    - cron: '0 3 * * *'    # 北京时间 11:00
    - cron: '0 14 * * *'   # 北京时间 22:00
  workflow_dispatch:

jobs:
  weather:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 运行天气预报并推送到 Discord
        env:
          GRIBSTREAM_TOKEN: ${{ secrets.GRIBSTREAM_TOKEN }}
          METEOBLUE_KEY: ${{ secrets.METEOBLUE_KEY }}
          ZBJ_DISCORD_WEBHOOK: ${{ secrets.ZBJ_DISCORD_WEBHOOK }}
        run: python zhuji_weather.py

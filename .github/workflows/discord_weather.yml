name: 诸暨天气推送

on:
  schedule:
    - cron: '0 22 * * *'   # 北京时间 06:00
  workflow_dispatch:

jobs:
  push-weather:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: 安装依赖
        run: pip install requests

      - name: 运行推送脚本
        env:
          GRIBSTREAM_TOKEN: ${{ secrets.GRIBSTREAM_TOKEN }}
          METEOBLUE_KEY: ${{ secrets.METEOBLUE_KEY }}
          ZBJ_DISCORD_WEBHOOK: ${{ secrets.ZBJ_DISCORD_WEBHOOK }}
        run: python3 zhuji_weather.py
